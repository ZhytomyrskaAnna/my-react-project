# Назва workflow
name: Deploy static content to Pages

on:
  # Запускати цей workflow при кожному push'і в гілку master
  # ВАЖЛИВО: Перевірте назву вашої основної гілки (main або master)
  push:
    branches: ['master']

  # Дозволяє запускати цей workflow вручну через вкладку Actions
  workflow_dispatch:

# Права доступу, необхідні для деплою на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Дозволяє тільки один процес деплою одночасно
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Задача деплою
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Завантажуємо код з репозиторія
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Встановлюємо Node.js
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Встановлюємо залежності (npm install)
      - name: Install dependencies
        run: npm ci

      # 4. Збираємо проект (npm run build)
      - name: Build
        run: npm run build

      # 5. Налаштовуємо Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. Завантажуємо папку dist (результат збірки) як артефакт
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Вказуємо шлях до папки, яку створив Vite (зазвичай dist)
          path: './dist'

      # 7. Деплоїмо артефакт на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
